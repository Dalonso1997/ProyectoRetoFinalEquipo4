<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLano aereo</title>
    
    <style>
        body {
            margin: 0;
            outline: none;
            overflow: hidden;
            /* Evita que salgan barras de scroll */
        }

        canvas {
            display: block;
            /* Elimina espacio extra debajo del canvas */
        }
    </style>
</head>

<body>
    <div id="fundido" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 999;"></div>    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        //laser
        const raycaster = new THREE.Raycaster();
        //posicion del raton
        const mouse = new THREE.Vector2();
        let objetoActual = null;

        // Escena y Fondo
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xDBDBDB);
        // renderer.shadowMap.enabled=true;
        // renderer.shadowMap.type=THREE.PCFSoftShadowMap;


        // Cámara
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 15);
        camera.lookAt(0, 0, 0);


        const posInicial = {
            x: camera.position.x,
            y: camera.position.y,
            z: camera.position.z
        };

        // Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // LUCES (El "interruptor")
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 1024;
        directionalLight.shadow.mapSize.height = 1024;
        directionalLight.shadow.camera.near = 0.5;
        directionalLight.shadow.camera.far = 50;
        directionalLight.shadow.camera.left = -15;
        directionalLight.shadow.camera.right = 15;
        directionalLight.shadow.camera.top = 15;
        directionalLight.shadow.camera.bottom = -15;

        //suelo
        const suelo = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x969696 })

        );
        suelo.receiveShadow = true;

        suelo.rotation.x = -Math.PI / 2;
        scene.add(suelo);
        

        //armarioA
        const armarioA = crearArmario(10, 5, 1.5, "armarioA");
        armarioA.position.x = 9.2;
        armarioA.position.z = 5;
        armarioA.position.y = 2.5;
        armarioA.rotation.y = 4.72;
        scene.add(armarioA);

        //mesaA
        const mesaA = crearArmario(6, 0.5, 2.5, "mesaA");
        mesaA.position.x = 2;
        mesaA.position.y = 1;
        mesaA.position.z = 8.8;
        mesaA.rotation.y = 3.14;
        scene.add(mesaA);

        //mesaB
        const mesaB = crearArmario(16, 0.5, 2.5, "mesaB");
        mesaB.position.x = -8.5;
        mesaB.position.y = 1;
        mesaB.position.z = -0.;
        mesaB.rotation.y = 1.58;
        scene.add(mesaB);

        //mesaC
        const mesaC = crearArmario(14, 0.5, 2.5, "mesaC");
        mesaC.position.x = 0;
        mesaC.position.y = 1;
        mesaC.position.z = -10;
        scene.add(mesaC);

        //const armarioAday = construirArmarioCompi(armarioAday);


        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children);

            if (intersects.length > 0 && intersects[0].object !== suelo) {
                const detectado = intersects[0].object;

                if (objetoActual !== detectado) {
                    objetoActual = detectado;
                    gsap.to(objetoActual.material.color, { r: 0.76, g: 0.47, b: 0.31, duration: 0.3 });
                }
            } else {
                if (objetoActual) {
                    // Resetear color original y cursor
                    gsap.to(objetoActual.material.color, { r: 0.58, g: 0.33, b: 0.21, duration: 0.3 });
                    objetoActual = null;
                    document.body.style.cursor = 'default';
                }
            }
        });

        window.addEventListener('click', () => {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children);

            if (intersects.length > 0) {
                const obj = intersects[0].object;
                if (obj !== suelo) {
                    enfocarArmario(obj);
                }
            }
        });


        function crearArmario(ancho, alto, largo, nombre) {
            const geo = new THREE.BoxGeometry(ancho, alto, largo);
            const mat = new THREE.MeshStandardMaterial({
                color: 0x945637,
                roughness: 0.7
            });
            const armario = new THREE.Mesh(geo, mat);
            armario.name = nombre;
            armario.castShadow = true;
            return armario;
        }

       function enfocarArmario(armarioClicado) {
            const distancia = 8;
            const offsetZ = Math.cos(armarioClicado.rotation.y) * distancia;
            const offsetX = Math.sin(armarioClicado.rotation.y) * distancia;

            // 1. Zoom de cámara
            gsap.to(camera.position, {
                x: armarioClicado.position.x + offsetX,
                y: 2,
                z: armarioClicado.position.z + offsetZ,
                duration: 1.5,
                ease: "power2.inOut",
                onUpdate: () => camera.lookAt(armarioClicado.position.x, 1, armarioClicado.position.z)
            });

            // 2. Fundido a negro y REDIRECCIÓN
            gsap.to("#fundido", {
                opacity: 1,
                duration: 0.8,
                delay: 0.7, 
                onComplete: () => {
                    // Si es el armario A, saltamos al archivo index.html
                    if (armarioClicado.name === "armarioA") {
                        window.location.href = "armario.html"; 
                    }
                }
            });
        }
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
        function construirArmarioCompi(nombreUnico) {
            // Creamos el contenedor principal donde irá todo el armario
            const grupoArmario = new THREE.Group();
            grupoArmario.name = nombreUnico;

            // Array para guardar los bloques de ropa (por si luego quieres hacer el panel de info)
            grupoArmario.userData.bloquesDeRopa = [];

            // --- MATERIALES ---
            const COLOR_ARMARIO = 0x945637;
            const COLOR_FONDOARMARIO = 0xA36546;
            const matMaderaOscura = new THREE.MeshStandardMaterial({ color: COLOR_ARMARIO });
            const matMetal = new THREE.MeshStandardMaterial({ color: COLOR_FONDOARMARIO, metalness: 0.8, roughness: 0.2 });

            // --- ESTRUCTURA PRINCIPAL ---
            const fondo = new THREE.Mesh(new THREE.BoxGeometry(4.5, 2, 0.02), matMetal);
            fondo.position.set(0, 1.25, -0.24); // Ajustada la altura (0.5 + 0.75)
            grupoArmario.add(fondo);

            const tabla = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.05, 0.5), matMaderaOscura);
            tabla.position.y = 1.75;
            tabla.castShadow = true;
            tabla.receiveShadow = true;
            grupoArmario.add(tabla);

            // --- FUNCIONES AUXILIARES (Internas) ---
            function crearCajonInterno(ancho, alto, profundo) {
                const grupoCajon = new THREE.Group();
                const baseCajon = new THREE.Mesh(new THREE.BoxGeometry(ancho, 0.03, profundo), matMaderaOscura);
                baseCajon.position.y = -alto / 2;
                baseCajon.castShadow = true; baseCajon.receiveShadow = true;
                grupoCajon.add(baseCajon);

                const geoVertical = new THREE.BoxGeometry(0.03, alto, profundo);
                const pIzq = new THREE.Mesh(geoVertical, matMaderaOscura);
                pIzq.position.set(-ancho / 2, -0.015, 0);
                pIzq.castShadow = true; pIzq.receiveShadow = true;
                grupoCajon.add(pIzq);

                const pDer = new THREE.Mesh(geoVertical, matMaderaOscura);
                pDer.position.set(ancho / 2, -0.015, 0);
                pDer.castShadow = true; pDer.receiveShadow = true;
                grupoCajon.add(pDer);

                return grupoCajon;
            }

            function crearCajonLargoDobleInterno(ancho, alto, profundo) {
                const grupocajones = new THREE.Group();
                const c1 = crearCajonInterno(ancho, alto, profundo);
                const c2 = crearCajonInterno(ancho, alto, profundo);
                c1.position.x = 0.5;
                grupocajones.add(c1, c2);
                return grupocajones;
            }

            function apilarCajonesInterno(ancho, alto, profundo) {
                const grupoAltura = new THREE.Group();
                const cAbajo = crearCajonLargoDobleInterno(ancho, alto, profundo);
                const cArriba = crearCajonLargoDobleInterno(ancho, alto, profundo);
                cArriba.position.y = alto;
                grupoAltura.add(cAbajo, cArriba);
                return grupoAltura;
            }

            function armarCajoneras(ancho, alto, profundo) {
                const grupo = new THREE.Group();
                const p1 = apilarCajonesInterno(ancho, alto, profundo);
                const p2 = apilarCajonesInterno(ancho, alto, profundo);
                const p3 = apilarCajonesInterno(ancho, alto, profundo);
                p1.position.set(-2, -0.08, 0);
                p2.position.set(-2, 0.58, 0);
                p3.position.set(-2, 1.25, 0);
                grupo.add(p1, p2, p3);
                return grupo;
            }

            function agregarBloqueRopa(ancho, altura, x, y, z, titulo, descripcion, cantidad) {
                const geoBloque = new THREE.BoxGeometry(ancho, altura, 0.4);
                let matBloque;

                if (cantidad === 0) matBloque = new THREE.MeshStandardMaterial({ color: 0x888888, transparent: true, opacity: 0.3 });
                else if (cantidad < 5) matBloque = new THREE.MeshStandardMaterial({ color: 0x4CAF50, transparent: true, opacity: 0.8 });
                else if (cantidad < 20) matBloque = new THREE.MeshStandardMaterial({ color: 0xFFC107, transparent: true, opacity: 0.8 });
                else matBloque = new THREE.MeshStandardMaterial({ color: 0xF44336, transparent: true, opacity: 0.8 });

                const bloque = new THREE.Mesh(geoBloque, matBloque);
                bloque.position.set(x, y, z);
                bloque.castShadow = true;
                bloque.receiveShadow = true;

                // Guardamos los datos
                bloque.userData = { titulo, descripcion, cantidad };
                // Le damos un nombre para identificar que es ropa
                bloque.name = "item_ropa";

                grupoArmario.add(bloque);
                grupoArmario.userData.bloquesDeRopa.push(bloque);
            }

            // --- MONTAJE DE CAJONES SUELTOS ---
            const cajones = [
                crearCajonInterno(0.5, 0.5, 0.5), crearCajonInterno(1, 0.25, 0.5), crearCajonInterno(1, 0.25, 0.5),
                crearCajonInterno(1, 0.25, 0.5), crearCajonInterno(1, 0.25, 0.5), crearCajonInterno(1, 0.5, 0.5),
                crearCajonInterno(0.5, 0.5, 0.5), crearCajonInterno(1, 0.5, 0.5), crearCajonInterno(1, 0.5, 0.5),
                crearCajonInterno(0.5, 0.5, 0.5), crearCajonInterno(1, 0.5, 0.5), crearCajonInterno(1, 0.5, 0.5),
                crearCajonInterno(0.5, 0.5, 0.5), crearCajonInterno(1, 0.5, 0.5)
            ];

            cajones[1].position.set(0.75, -0.12, 0); cajones[2].position.set(0.75, 0.12, 0);
            cajones[3].position.set(-0.75, -0.12, 0); cajones[4].position.set(-0.75, 0.12, 0);
            cajones[5].position.set(-0.75, 0.5, 0); cajones[6].position.set(0, 0.5, 0);
            cajones[7].position.set(0.75, 0.5, 0); cajones[8].position.set(-0.75, 1, 0);
            cajones[9].position.set(0, 1, 0); cajones[10].position.set(0.75, 1, 0);
            cajones[11].position.set(-0.75, 1.5, 0); cajones[12].position.set(0, 1.5, 0);
            cajones[13].position.set(0.75, 1.5, 0);

            cajones.forEach(c => grupoArmario.add(c));

            // --- MONTAJE DE CAJONERAS LATERALES ---
            const arm1 = armarCajoneras(0.5, 0.3333, 0.5);
            const arm2 = armarCajoneras(0.5, 0.3333, 0.5);
            arm1.position.x = 0;
            arm2.position.x = 3.5;
            grupoArmario.add(arm1, arm2);

            // --- AÑADIR LA ROPA ---
            agregarBloqueRopa(0.35, 0.20, 0, 0.35, 0, "Bloque Superior", "Camisetas de algodón 100%.", 0);
            agregarBloqueRopa(0.35, 0.20, 0, -0.15, 0, "Bloque Superior", "Jerséis de lana merino.", 0);
            agregarBloqueRopa(0.35, 0.200, 0, 0.88, 0, "Bloque Inferior", "Pantalones vaqueros rectos.", 0);
            agregarBloqueRopa(0.35, 0.200, 0, 1.35, 0, "Bloque Inferior", "Pantalones chinos color beige.", 0);
            agregarBloqueRopa(0.35, 0.15, 1.35, 0, "Bloque Inferior", "Cinturones de cuero negro.", 0);
            agregarBloqueRopa(0.35, 0.15, 0.5, 0.09, 0, "Bloque Inferior", "Calcetines deportivos blancos.", 0);
            agregarBloqueRopa(0.35, 0.15, 1, 0.09, 0, "Bloque Inferior", "Ropa interior, boxers oscuros.", 0);
            agregarBloqueRopa(0.35, 0.15, 1, -0.15, 0, "Bloque Inferior", "Corbatas de seda estampadas.", 0);
            agregarBloqueRopa(0.35, 0.15, 0.5, -0.15, 0, "Bloque Inferior", "Pajaritas y pañuelos de bolsillo.", 0);
            agregarBloqueRopa(0.35, 0.15, -0.5, -0.15, 0, "Bloque Inferior", "Bufandas de invierno.", 0);
            agregarBloqueRopa(0.35, 0.15, -0.5, 0.09, 0, "Bloque Inferior", "Guantes de piel sintética.", 0);
            agregarBloqueRopa(0.35, 0.15, -1, 0.09, 0, "Bloque Inferior", "Pantalones cortos de deporte.", 0);
            agregarBloqueRopa(0.35, 0.20, -1, -0.15, 0, "Bloque Inferior", "Camisetas de tirantes para gimnasio.", 0);

            agregarBloqueRopa(0.3, 0.40, -1, 0.45, 0, "Bloque Inferior", "Chaquetas de entretiempo.", 0);
            agregarBloqueRopa(0.3, 0.40, -0.5, 0.45, 0, "Bloque Inferior", "Abrigos largos de lana.", 0);
            agregarBloqueRopa(0.3, 0.40, -0.5, 0.95, 0, "Bloque Inferior", "Trajes de chaqueta azul marino.", 0);
            agregarBloqueRopa(0.3, 0.40, -1, 0.95, 0, "Bloque Inferior", "Trajes de chaqueta grises.", 0);
            agregarBloqueRopa(0.3, 0.40, -0.5, 1.45, 0, "Bloque Inferior", "Camisas de vestir blancas.", 0);
            agregarBloqueRopa(0.3, 0.40, -1, 1.45, 0, "Bloque Inferior", "Camisas de vestir celestes.", 0);

            agregarBloqueRopa(0.3, 0.40, 0.5, 0.45, 0, "Bloque Inferior", "Chalecos acolchados.", 0);
            agregarBloqueRopa(0.3, 0.40, 1, 0.45, 0, "Bloque Inferior", "Cazadoras vaqueras clásicas.", 0);
            agregarBloqueRopa(0.3, 0.40, 0.5, 0.95, 0, "Bloque Inferior", "Sudaderas con capucha.", 0);
            agregarBloqueRopa(0.3, 0.40, 1, 0.95, 0, "Bloque Inferior", "Polos de manga corta.", 0);
            agregarBloqueRopa(0.3, 0.40, 0.5, 1.45, 0, "Bloque Inferior", "Chaquetas de cuero negro.", 0);
            agregarBloqueRopa(0.3, 0.40, 1, 1.45, 0, "Bloque Inferior", "Gabardinas impermeables.", 0);

            agregarBloqueRopa(0.3, 0.20, -2, 1.51, 0, "Bloque Inferior", "Zapatos de vestir negros.", 0);
            agregarBloqueRopa(0.3, 0.20, -2, 1.2, 0, "Bloque Inferior", "Zapatos de vestir marrones.", 0);
            agregarBloqueRopa(0.3, 0.20, -2, 0.85, 0, "Bloque Inferior", "Zapatillas deportivas de correr.", 0);
            agregarBloqueRopa(0.3, 0.20, -2, 0.5, 0, "Bloque Inferior", "Botas de montaña impermeables.", 0);
            agregarBloqueRopa(0.3, 0.20, -2, 0.2, 0, "Bloque Inferior", "Mocasines de ante.", 0);
            agregarBloqueRopa(0.3, 0.20, -2, -0.13, 0, "Bloque Inferior", "Sandalias de verano.", 0);
            agregarBloqueRopa(0.3, 0.20, -1.5, 1.51, 0, "Bloque Inferior", "Pijamas de invierno de franela.", 0);
            agregarBloqueRopa(0.3, 0.20, -1.5, 1.2, 0, "Bloque Inferior", "Pijamas de verano ligeros.", 0);
            agregarBloqueRopa(0.3, 0.20, -1.5, 0.85, 0, "Bloque Inferior", "Bañadores cortos estampados.", 0);
            agregarBloqueRopa(0.3, 0.20, -1.5, 0.5, 0, "Bloque Inferior", "Toallas de baño de microfibra.", 0);
            agregarBloqueRopa(0.3, 0.20, -1.5, 0.2, 0, "Bloque Inferior", "Mantas polares para sofá.", 0);
            agregarBloqueRopa(0.3, 0.20, -1.5, -0.13, 0, "Bloque Inferior", "Juego de sábanas de algodón.", 0);

            agregarBloqueRopa(0.3, 0.20, 2, 1.51, 0, "Bloque Inferior", "Gorros de lana de invierno.", 2);
            agregarBloqueRopa(0.3, 0.20, 2, 1.2, 0, "Bloque Inferior", "Camisetas básicas negras.", 10);
            agregarBloqueRopa(0.3, 0.20, 2, 0.85, 0, "Bloque Inferior", "Pantalones vaqueros talla 40.", 30);
            agregarBloqueRopa(0.3, 0.20, 2, 0.5, 0, "Bloque Inferior", "Pantalones de chándal grises.", 0);
            agregarBloqueRopa(0.3, 0.20, 2, 0.2, 0, "Bloque Inferior", "Camisas de lino para verano.", 0);
            agregarBloqueRopa(0.3, 0.20, 2, -0.13, 0, "Bloque Inferior", "Cortavientos reflectantes.", 0);
            agregarBloqueRopa(0.3, 0.20, 1.5, 1.51, 0, "Bloque Inferior", "Sombreros de paja para el sol.", 0);
            agregarBloqueRopa(0.3, 0.20, 1.5, 1.2, 0, "Bloque Inferior", "Cinturones trenzados informales.", 0);
            agregarBloqueRopa(0.3, 0.20, 1.5, 0.85, 0, "Bloque Inferior", "Calcetines de lana gruesa.", 0);
            agregarBloqueRopa(0.3, 0.20, 1.5, 0.5, 0, "Bloque Inferior", "Mochilas de uso diario.", 0);
            agregarBloqueRopa(0.3, 0.20, 1.5, 0.2, 0, "Bloque Inferior", "Bolsas de deporte para el gimnasio.", 0);
            agregarBloqueRopa(0.3, 0.20, 1.5, -0.13, 0, "Bloque Inferior", "Zapatillas de andar por casa.", 0);

            // Ajuste opcional para que quede centrado respecto a su punto de origen
            grupoArmario.position.y = 0.5;

            return grupoArmario;
        }
    </script>
</body>

</html>
