<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLano aereo</title>
    <style>
        body {
            margin: 0;
            outline: none;
            overflow: hidden;
            /* Evita que salgan barras de scroll */
        }

        canvas {
            display: block;
            /* Elimina espacio extra debajo del canvas */
        }
    </style>
</head>

<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Escena y Fondo
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        // Cámara
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 15);
        camera.lookAt(0, 0, 0);

        // Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // LUCES (El "interruptor")
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // OBJETO DE PRUEBA (Un suelo para ver que hay luz)
        const suelo = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x808080 })
        );

        suelo.rotation.x = -Math.PI / 2;
        scene.add(suelo);

        //armarioA
        const armarioA = crearArmario(10, 5, 1.5);
        armarioA.position.x = 9.2;
        armarioA.position.z = 5;
        armarioA.position.y = 2.5;
        armarioA.rotation.y = 1.58;
        scene.add(armarioA);

        //mesaA
        const mesaA = crearArmario(6, 0.5, 2.5);
        mesaA.position.x = 2;
        mesaA.position.y = 1;
        mesaA.position.z = 8.8;
        scene.add(mesaA)

        //mesaB
        const mesaB = crearArmario(16, 0.5, 2.5);
        mesaB.position.x = -8.5;
        mesaB.position.y = 1;
        mesaB.position.z = -0.;
        mesaB.rotation.y = 1.58;
        scene.add(mesaB)


        function crearArmario(ancho, alto, largo) {
            const geo = new THREE.BoxGeometry(ancho, alto, largo);
            const mat = new THREE.MeshStandardMaterial({
                color: 0x2c3e50,
                roughness: 0.7
            });
            const armario = new THREE.Mesh(geo, mat);
            armario.name = "armarioA";
            return armario;
        }
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>

</html>
