        // 1. CONFIGURACIÓN BÁSICA

       // 5. CONTROL DE CÁMARA Y SISTEMA DE CLICKS
        let drag = false, lastX = 0, lastY = 0;
        let rotY = 0.5, rotX = 0.2, radius = 5;
        let mouseMovido = false; // Variable para saber si arrastramos o hicimos click limpio

        // Configuración del Raycaster
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateCamera() {
            camera.position.x = radius * Math.sin(rotY) * Math.cos(rotX);
            camera.position.y = radius * Math.sin(rotX) + 0.5;
            camera.position.z = radius * Math.cos(rotY) * Math.cos(rotX);
            camera.lookAt(0, 0.5, 0);
        }

        window.addEventListener('mousedown', e => { 
            drag = true; 
            mouseMovido = false; // Reseteamos al hacer click
            lastX = e.clientX; 
            lastY = e.clientY; 
        });

        window.addEventListener('mousemove', e => {
            if (!drag) return;
            mouseMovido = true; // Si movemos el ratón mientras pulsamos, es un arrastre
            rotY += (e.clientX - lastX) * 0.005;
            rotX -= (e.clientY - lastY) * 0.005;
            rotX = Math.max(-1.2, Math.min(1.2, rotX));
            lastX = e.clientX; 
            lastY = e.clientY;
        });

        window.addEventListener('mouseup', e => { 
            drag = false; 
            
            // SI NO MOVIMOS EL RATÓN, ES UN CLICK VÁLIDO PARA LEER INFORMACIÓN
            if (!mouseMovido) {
                // Calcular coordenadas normalizadas del ratón
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);

                // Buscar qué bloque hemos tocado
                const intersects = raycaster.intersectObjects(bloquesInteractivos);

                if (intersects.length > 0) {
                    const bloqueTocado = intersects[0].object;
                    mostrarInformacion(bloqueTocado.userData);
                } else {
                    // Si hacemos click fuera de un bloque, ocultamos el panel
                    document.getElementById('panel-info').style.display = 'none';
                }
            }
        });

        window.addEventListener('wheel', e => {
            radius = Math.max(2, Math.min(10, radius + e.deltaY * 0.01));
        });

        // 6. BUCLE DE ANIMACIÓN
        function animate() {
            requestAnimationFrame(animate);

           

            updateCamera();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();



    

    function mostrarInformacion(datos) {
            const panel = document.getElementById('panel-info');
            const tituloDiv = document.getElementById('info-titulo');
            const descDiv = document.getElementById('info-desc');
            const cantidad = document.getElementById('info-cantidad');
            const  id = document.getElementById("info-id");
            const  fecha = document.getElementById("info-fecha");

            tituloDiv.innerText = datos.titulo;
            id.innerText = "Id: "+datos.id;
            fecha.innerText = "Fecha: "+datos.fecha;
            descDiv.innerText = "Especificaciones: "+datos.descripcion;
            cantidad.innerText = "Cantidad: "+datos.cantidad;


            panel.style.display = 'block'; // Hacerlo visible
        }

    function crearCajon(ancho, alto, profundo) {
        const grupoCajon = new THREE.Group();

        // Material para el cajón
        const matCajon = new THREE.MeshStandardMaterial({ color: COLOR_ARMARIO });

        
        
        // Base del cajón
        const baseCajon = new THREE.Mesh(new THREE.BoxGeometry(ancho, 0.03, profundo), matCajon);
        baseCajon.position.y = -alto/2;
        grupoCajon.add(baseCajon);

        baseCajon.castShadow = true; // <--- Sombra
        baseCajon.receiveShadow = true;

        const geoVertical = new THREE.BoxGeometry(0.03, alto, profundo);
        const pIzq = new THREE.Mesh(geoVertical, matCajon);
        pIzq.position.set(-ancho/2, -0.015, 0);
        grupoCajon.add(pIzq);
        pIzq.castShadow = true;
        pIzq.receiveShadow =true;
        
        const pDer = new THREE.Mesh(geoVertical, matCajon);
        pDer.position.set(ancho/2, -0.015, 0);
        grupoCajon.add(pDer);
        pDer.castShadow = true;
        pDer.receiveShadow =true;



        

        return grupoCajon; 
    }

    // Añadimos 'id' y 'fecha' al final de los paréntesis
    function crearBloque(ancho, altura, x, y, z, titulo, descripcion, cantidad, id, fecha) {
        const geoBloque = new THREE.BoxGeometry(ancho, altura, 0.4);
        let matBloque; 

        if (cantidad === 0) {
            matBloque = new THREE.MeshStandardMaterial({ color: 0x888888, transparent: true, opacity: 0.3 });
        } else if (cantidad < 5) {
            matBloque = new THREE.MeshStandardMaterial({ color: 0x4CAF50, transparent: true, opacity: 0.8 });
        } else if (cantidad < 20) {
            matBloque = new THREE.MeshStandardMaterial({ color: 0xFFC107, transparent: true, opacity: 0.8 });
        } else {
            matBloque = new THREE.MeshStandardMaterial({ color: 0xF44336, transparent: true, opacity: 0.8 });
        }

        const bloque = new THREE.Mesh(geoBloque, matBloque);

        bloque.position.set(x, y, z);
        bloque.castShadow = true;
        bloque.receiveShadow = true;
        
        // Guardamos todos los datos limpios en el bloque
        bloque.userData = {
            id: id,
            titulo: titulo,
            fecha: fecha,
            descripcion: descripcion,
            cantidad: cantidad
        };
        
        scene.add(bloque);
        bloquesInteractivos.push(bloque);
    }


    function crearCajonLargoDoble(ancho, alto, profundo) {
       
        const grupocajones = new THREE.Group();
        
        
        const cajon1 = crearCajon(ancho,alto,profundo);
        const cajon2 = crearCajon(ancho,alto,profundo);
        
        
        cajon1.position.x = 0.5;
        grupocajones.add(cajon1);
        grupocajones.add(cajon2);


        

        return grupocajones; 
    }

    function apilarCajones(ancho, alto, profundo){


            const grupoAltura = new THREE.Group();


            const cajonAbajo = crearCajonLargoDoble(ancho,alto,profundo);
            const cajonArriba = crearCajonLargoDoble(ancho,alto,profundo);

            cajonArriba.position.y = alto;

            
            grupoAltura.add(cajonAbajo);
            grupoAltura.add(cajonArriba);


            return grupoAltura;



    }


    function armario(ancho, alto, profundo){


            const grupoArmario = new THREE.Group();

            


            const cajonlargoApiladp1 = apilarCajones(ancho,alto,profundo);
            const cajonlargoApiladp2 = apilarCajones(ancho,alto,profundo);
            const cajonlargoApiladp3 = apilarCajones(ancho,alto,profundo);

            cajonlargoApiladp1.position.x = -2;
            cajonlargoApiladp1.position.y = -0.08;

            cajonlargoApiladp2.position.x = -2;
            cajonlargoApiladp2.position.y = .58;

            cajonlargoApiladp3.position.x = -2;
            cajonlargoApiladp3.position.y = 1.25;

            

            
            grupoArmario.add(cajonlargoApiladp1);
            grupoArmario.add(cajonlargoApiladp2);
            grupoArmario.add(cajonlargoApiladp3);


            return grupoArmario;



    }

        function pedirDatos() {
    fetch('/api/inventario')
        .then(respuesta => respuesta.json())
        .then(datos => {
            
            huecosArmario.forEach((hueco, indice) => {
                const fila = datos[indice];
                let tituloBloque, descBloque, cantBloque, idBloque, fechaBloque;

                if (fila) {
                    
                    idBloque = fila.id_inventario || "N/A";
                    tituloBloque = fila.nombre || "Sin Nombre"; 
                    fechaBloque = fila.fecha_registro || "Sin Fecha";
                    descBloque = fila.descripcion || "Sin Descripción";
                    cantBloque = fila.cantidad || 0; 
                } else {
                    idBloque = "-";
                    tituloBloque = "Hueco Vacío";
                    fechaBloque = "-";
                    descBloque = "Disponible.";
                    cantBloque = 0; 
                }

                crearBloque(
                    hueco.ancho, hueco.alto,   
                    hueco.x, hueco.y, hueco.z,  
                    tituloBloque, 
                    descBloque, 
                    cantBloque,
                    idBloque,
                    fechaBloque
                );
            });
        })
        .catch(error => console.error("Error:", error));
}
